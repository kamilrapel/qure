  <style>
    @import url('https://fonts.cdnfonts.com/css/metropolis-2');

    :root {
      --bg: #e5e5e5;
      --ink: #000000;
      --ease: cubic-bezier(.2,.7,.2,1);
      --font-display: 'Metropolis', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-display);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .stage {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(8px, 1.5vw, 18px);
      padding: clamp(24px, 5vh, 56px) 24px;
      text-align: center;
    }

    .logo-wrap {
      width: min(72vw, 460px);
      animation: breathe 4.2s var(--ease) infinite;
      will-change: transform, opacity;
    }
    .logo-wrap img { width: 100%; height: auto; display: block; }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.04); opacity: .88; }
    }

    .label {
      font-weight: 700;
      letter-spacing: 0.32em;
      font-size: clamp(10px, 1.1vw, 13px);
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .dots { display: inline-flex; gap: 4px; }
    .dots span {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--ink);
      opacity: .25;
      animation: blink 1.4s infinite var(--ease);
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: .25; transform: translateY(0); }
      40%           { opacity: 1;   transform: translateY(-2px); }
    }

    .benefits {
      flex: 0 0 auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: clamp(16px, 3.5vw, 48px);
      padding: 0 24px clamp(28px, 6vh, 64px);
      padding-bottom: calc(clamp(28px, 6vh, 64px) + env(safe-area-inset-bottom));
      opacity: 0;
      animation: fadeUp 1.1s var(--ease) .8s forwards;
    }

    .benefits .icon {
      width: clamp(56px, 7vw, 96px);
      height: auto;
      display: block;
      opacity: .9;
      transition: opacity .25s var(--ease), transform .25s var(--ease);
    }
    .benefits .icon:hover {
      opacity: 1;
      transform: translateY(-2px);
    }

    .reveal {
      opacity: 0;
      animation: reveal 1.1s var(--ease) .1s forwards;
    }
    @keyframes reveal {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .logo-wrap { width: min(70vw, 360px); }
      .benefits .icon { width: clamp(54px, 9vw, 80px); }
    }

    @media (max-width: 600px) {
      .stage { gap: 10px; padding: 32px 20px 12px; }
      .logo-wrap { width: 78vw; max-width: 320px; }
      .label { font-size: 10px; letter-spacing: 0.28em; }
      .benefits {
        gap: 16px 22px;
        padding: 8px 16px 28px;
        padding-bottom: calc(28px + env(safe-area-inset-bottom));
      }
      .benefits .icon { width: 52px; }
    }

    @media (max-width: 380px) {
      .logo-wrap { width: 80vw; }
      .benefits { gap: 12px 18px; }
      .benefits .icon { width: 46px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-wrap, .dots span, .reveal, .benefits {
        animation: none; opacity: 1; transform: none;
      }
    }
  </style>
</head>
